<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Curriculum Vitae</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    
    <!-- HEADER -->
    <header class="header">
        <h1>Tu Nombre</h1>
        <p>Desarrollador / Estudiante</p>
    </header>

    <!-- EDUCACIÓN -->
    <section class="section">
        <h2>Educación</h2>
        
        <div class="card">
            <h3>Universidad / Colegio</h3>
            <span>2020 - 2024</span>
            <p>Descripción breve de lo que estudiaste.</p>
        </div>

    </section>

    <!-- EXPERIENCIA -->
    <section class="section">
        <h2>Experiencia Laboral</h2>

        <div class="card">
            <h3>Empresa XYZ</h3>
            <span>2023 - Actualidad</span>
            <p>Descripción de lo que hiciste, tecnologías, responsabilidades.</p>
        </div>

    </section>

</div>

</body>
</html>
